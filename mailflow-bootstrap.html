<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailFlow — Cliente de Email</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: {
        extend: {
          fontFamily: { poppins: ['Poppins', 'sans-serif'] },
          colors: {
            crimson: {
              50:  '#fff0f0',
              100: '#ffd6d6',
              200: '#ffb0b0',
              300: '#ff7878',
              400: '#ff3f3f',
              500: '#ff1a1a',
              600: '#e00000',
              700: '#8B0000',
              800: '#6B0000',
              900: '#4A0000',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* ─── CSS Variables ──────────────────────────────────────────────────────── */
    :root {
      --crimson:        #8B0000;
      --crimson-light:  #A80000;
      --crimson-dark:   #5A0000;
      --crimson-faint:  rgba(139,0,0,0.07);
      --crimson-soft:   rgba(139,0,0,0.22);
      --crimson-glow:   rgba(139,0,0,0.35);

      --bg:             #F3EFEF;
      --surface:        #EDE8E8;
      --card:           #FFFFFF;
      --border:         #DDD6D6;
      --border-light:   #EDE8E8;

      --text-1:         #1A0F0F;
      --text-2:         #5C4A4A;
      --text-3:         #9B8585;
      --text-inv:       #FFFFFF;

      --sidebar-w:      252px;
      --topbar-h:       64px;
      --list-w:         320px;

      --radius-xs:      6px;
      --radius-sm:      10px;
      --radius:         14px;
      --radius-lg:      20px;
      --radius-pill:    9999px;

      --shadow-xs:      0 1px 3px rgba(0,0,0,0.06);
      --shadow-sm:      0 2px 8px rgba(139,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md:      0 6px 20px rgba(139,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg:      0 16px 40px rgba(139,0,0,0.16), 0 4px 12px rgba(0,0,0,0.1);
      --shadow-xl:      0 24px 56px rgba(139,0,0,0.2), 0 8px 24px rgba(0,0,0,0.14);

      --transition:     all 0.2s cubic-bezier(0.4,0,0.2,1);
      --spring:         all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    /* Dark mode */
    [data-theme="dark"] {
      --bg:           #0E1117;
      --surface:      #1A2030;
      --card:         #1E2738;
      --border:       #2A3548;
      --border-light: #243044;
      --text-1:       #EDF2F8;
      --text-2:       #8BA0BC;
      --text-3:       #546880;
      --crimson-faint: rgba(139,0,0,0.18);
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.4);
      --shadow-md:    0 6px 20px rgba(0,0,0,0.5);
      --shadow-lg:    0 16px 40px rgba(0,0,0,0.6);
    }

    /* ─── Base ───────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
    }

    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Scrollbar ──────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--crimson-soft); }

    ::selection { background: var(--crimson-soft); color: var(--text-1); }

    /* ─── Animations ─────────────────────────────────────────────────────────── */
    @keyframes fadeUp     { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
    @keyframes slideLeft  { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes scaleIn    { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    @keyframes bounceUp   { 0%{transform:translateY(30px) scale(0.9);opacity:0} 60%{transform:translateY(-6px) scale(1.02);opacity:1} 100%{transform:translateY(0) scale(1);} }
    @keyframes spin       { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes shimmer    { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
    @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.45} }
    @keyframes dotBounce  { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

    .anim-fadeUp    { animation: fadeUp    .32s cubic-bezier(.4,0,.2,1) both; }
    .anim-fadeIn    { animation: fadeIn    .25s ease both; }
    .anim-slideLeft { animation: slideLeft .28s cubic-bezier(.4,0,.2,1) both; }
    .anim-slideRight{ animation: slideRight.25s cubic-bezier(.4,0,.2,1) both; }
    .anim-scaleIn   { animation: scaleIn   .22s cubic-bezier(.4,0,.2,1) both; }
    .anim-bounceUp  { animation: bounceUp  .36s cubic-bezier(.34,1.56,.64,1) both; }

    /* ─── Skeleton ───────────────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border-light) 50%, var(--surface) 75%);
      background-size: 600px 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-xs);
    }

    /* ─── Topbar ─────────────────────────────────────────────────────────────── */
    #topbar {
      height: var(--topbar-h);
      background: var(--card);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--shadow-xs);
    }

    /* Logo */
    .logo-mark {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-dark) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px var(--crimson-glow);
      flex-shrink: 0;
      transition: var(--transition);
    }
    .logo-mark:hover { transform: scale(1.07) rotate(-3deg); }
    .logo-text {
      font-size: 19px; font-weight: 800; letter-spacing: -0.04em;
      color: var(--text-1); white-space: nowrap;
    }
    .logo-text span { color: var(--crimson); }

    /* Search */
    .search-wrap {
      flex: 1; max-width: 540px;
      display: flex; align-items: center; gap: 9px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0 16px;
      height: 42px;
      transition: var(--transition);
    }
    .search-wrap:focus-within {
      background: var(--card);
      border-color: var(--crimson);
      box-shadow: 0 0 0 3px var(--crimson-faint);
    }
    .search-wrap input {
      flex: 1; border: none; background: transparent;
      font-family: 'Poppins', sans-serif; font-size: 13px;
      color: var(--text-1); outline: none;
    }
    .search-wrap input::placeholder { color: var(--text-3); }
    .search-icon { color: var(--text-3); transition: color .2s; font-size: 15px; }
    .search-wrap:focus-within .search-icon { color: var(--crimson); }
    .search-clear {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--text-3); border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      color: white; font-size: 10px; flex-shrink: 0;
      transition: background .15s;
    }
    .search-clear:hover { background: var(--crimson); }
    .search-clear.visible { display: flex; }

    /* Icon buttons */
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 50%; border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-2); font-size: 17px;
      transition: var(--transition); position: relative; flex-shrink: 0;
    }
    .icon-btn:hover { background: var(--surface); color: var(--text-1); }
    .icon-btn.active { color: var(--crimson); background: var(--crimson-faint); }

    .badge-dot {
      position: absolute; top: 8px; right: 8px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--crimson); border: 1.5px solid var(--card);
    }

    .topbar-divider {
      width: 1px; height: 24px;
      background: var(--border-light); flex-shrink: 0;
    }

    .user-avatar-btn {
      border: none; background: none; cursor: pointer;
      border-radius: 50%; padding: 2px;
      transition: transform .15s;
    }
    .user-avatar-btn:hover { transform: scale(1.08); }

    /* ─── Main layout ────────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── Sidebar ────────────────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      height: 100%;
      background: var(--card);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width .3s cubic-bezier(.4,0,.2,1), opacity .3s;
      animation: slideLeft .28s cubic-bezier(.4,0,.2,1) both;
    }
    #sidebar.collapsed {
      width: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* Compose button */
    .compose-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 12px 18px;
      margin: 14px 10px 8px;
      width: calc(100% - 20px);
      border-radius: var(--radius);
      background: var(--crimson);
      color: white; border: none; cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 13.5px; font-weight: 700;
      box-shadow: 0 4px 18px var(--crimson-glow);
      transition: var(--spring);
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .compose-btn:hover {
      background: var(--crimson-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--crimson-glow);
    }
    .compose-btn:active { transform: translateY(0); }

    /* Nav items */
    .nav-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text-3);
      padding: 10px 18px 4px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      width: calc(100% - 12px); margin: 1px 6px;
      padding: 9px 13px;
      border-radius: var(--radius-sm);
      border: none; background: transparent; cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 400;
      color: var(--text-2);
      transition: var(--transition);
      white-space: nowrap;
      position: relative; overflow: hidden;
      text-align: left;
    }
    .nav-item::before {
      content: '';
      position: absolute; left: 0; top: 15%; bottom: 15%;
      width: 3px; border-radius: 0 3px 3px 0;
      background: var(--crimson);
      transform: scaleY(0); transition: transform .2s;
    }
    .nav-item:hover { background: var(--surface); color: var(--text-1); }
    .nav-item.active {
      background: var(--crimson-faint);
      color: var(--crimson);
      font-weight: 600;
    }
    .nav-item.active::before { transform: scaleY(1); }

    .nav-item .nav-icon { font-size: 16px; flex-shrink: 0; }
    .nav-item .nav-label { flex: 1; }
    .nav-badge {
      font-size: 11px; font-weight: 700;
      padding: 1px 8px; border-radius: var(--radius-pill);
      background: var(--surface); color: var(--text-2);
      min-width: 22px; text-align: center;
    }
    .nav-item.active .nav-badge {
      background: var(--crimson);
      color: white;
    }

    /* Tags */
    .tag-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    /* Sidebar footer */
    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--border-light);
      padding: 10px 10px;
      display: flex; align-items: center; gap: 9px;
    }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name { font-size: 12px; font-weight: 600; color: var(--text-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-user-email { font-size: 10.5px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── Email List Panel ───────────────────────────────────────────────────── */
    #email-list-panel {
      width: var(--list-w);
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .list-header {
      padding: 13px 16px 9px;
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .list-title {
      font-size: 14px; font-weight: 700; color: var(--text-1);
      letter-spacing: -.02em;
    }
    .unread-chip {
      font-size: 10.5px; font-weight: 700;
      color: var(--crimson); background: var(--crimson-faint);
      padding: 2px 9px; border-radius: var(--radius-pill);
    }

    /* Filter tabs */
    .filter-tabs {
      display: flex; gap: 3px; padding: 7px 10px;
      border-bottom: 1px solid var(--border-light); flex-shrink: 0;
    }
    .filter-tab {
      padding: 4px 13px; border-radius: var(--radius-pill);
      border: none; background: transparent; cursor: pointer;
      font-family: 'Poppins', sans-serif; font-size: 11.5px; font-weight: 500;
      color: var(--text-3); transition: var(--transition);
    }
    .filter-tab:hover { background: var(--surface); color: var(--text-2); }
    .filter-tab.active {
      background: var(--crimson-faint); color: var(--crimson); font-weight: 600;
    }

    /* Email list */
    #email-list { flex: 1; overflow-y: auto; padding: 5px 4px; }

    /* Email item */
    .email-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer; margin-bottom: 2px;
      border: 1.5px solid transparent;
      transition: var(--transition);
      position: relative;
    }
    .email-item::after {
      content: '';
      position: absolute; left: 3px; top: 50%; transform: translateY(-50%);
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--crimson);
      opacity: 0; transition: opacity .15s;
    }
    .email-item.unread::after { opacity: 1; }
    .email-item:hover { background: var(--surface); }
    .email-item.selected {
      background: var(--crimson-faint);
      border-color: var(--crimson-soft);
    }

    .email-item-avatar { flex-shrink: 0; margin-top: 1px; }

    .email-item-body { flex: 1; min-width: 0; }

    .email-item-row1 { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .email-item-from {
      font-size: 12.5px; flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; color: var(--text-1);
    }
    .email-item.unread .email-item-from { font-weight: 700; }
    .email-item-date {
      font-size: 10.5px; color: var(--text-3); flex-shrink: 0;
    }
    .email-item.unread .email-item-date { font-weight: 600; color: var(--text-2); }

    .email-item-subject {
      font-size: 12.5px; font-weight: 400;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: var(--text-2); margin-bottom: 3px;
    }
    .email-item.unread .email-item-subject { font-weight: 600; color: var(--text-1); }

    .email-item-row3 { display: flex; align-items: center; gap: 5px; }
    .email-item-preview {
      font-size: 11.5px; color: var(--text-3); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Hover actions */
    .email-item-actions {
      display: none; gap: 2px; flex-shrink: 0;
    }
    .email-item:hover .email-item-actions { display: flex; }
    .email-item:hover .email-item-date { display: none; }

    .action-mini {
      width: 24px; height: 24px; border-radius: 50%;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-2);
      transition: var(--transition);
    }
    .action-mini:hover { background: var(--border); color: var(--text-1); }
    .action-mini.danger:hover { background: #fee2e2; color: #dc2626; }

    /* Star btn */
    .star-btn {
      background: none; border: none; cursor: pointer;
      padding: 2px; border-radius: 4px; flex-shrink: 0;
      color: var(--text-3); font-size: 13px;
      transition: var(--transition); opacity: 0;
    }
    .email-item:hover .star-btn,
    .star-btn.starred { opacity: 1; }
    .star-btn.starred { color: #f59e0b; }

    /* Tag pill */
    .tag-pill {
      font-size: 9.5px; font-weight: 700;
      padding: 2px 7px; border-radius: var(--radius-pill);
      text-transform: uppercase; letter-spacing: .05em;
      white-space: nowrap;
    }

    /* Load more */
    .load-more-btn {
      width: calc(100% - 16px); margin: 6px 8px;
      padding: 9px; border-radius: var(--radius-sm);
      border: 1.5px dashed var(--border); background: transparent;
      color: var(--text-3); cursor: pointer; font-size: 12px;
      font-family: 'Poppins', sans-serif; font-weight: 500;
      transition: var(--transition);
    }
    .load-more-btn:hover { border-color: var(--crimson-soft); color: var(--crimson); background: var(--crimson-faint); }

    /* ─── Email View Panel ───────────────────────────────────────────────────── */
    #email-view-panel {
      flex: 1; display: flex; flex-direction: column;
      background: var(--bg); height: 100%; overflow: hidden;
    }

    /* Empty state */
    #empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: var(--text-3); animation: fadeIn .3s ease;
    }
    .empty-icon-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: var(--border);
    }

    /* View toolbar */
    #view-toolbar {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 18px;
      background: var(--card); border-bottom: 1px solid var(--border-light);
      flex-shrink: 0; box-shadow: var(--shadow-xs);
    }
    .toolbar-divider { width: 1px; height: 20px; background: var(--border-light); margin: 0 4px; }

    /* View content */
    #view-content { flex: 1; overflow-y: auto; padding: 28px 40px; }

    .email-subject-title {
      font-size: 22px; font-weight: 800; letter-spacing: -.03em;
      color: var(--text-1); margin-bottom: 18px; line-height: 1.3;
    }

    /* Sender card */
    .sender-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border-light);
      padding: 14px 18px; margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 13px;
    }
    .sender-name { font-weight: 700; font-size: 13.5px; color: var(--text-1); }
    .sender-email { font-size: 11.5px; color: var(--text-3); margin-left: 7px; }
    .sender-date { font-size: 11.5px; color: var(--text-3); margin-left: auto; white-space: nowrap; }
    .sender-to { font-size: 12px; color: var(--text-3); }

    /* Attachment card */
    .attachments-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border-light);
      padding: 11px 16px; margin-bottom: 14px;
    }
    .attachment-chip {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      font-size: 12px; color: var(--text-2); cursor: pointer;
      transition: var(--transition);
    }
    .attachment-chip:hover { border-color: var(--crimson-soft); color: var(--crimson); }
    .attachment-chip i { color: var(--crimson); }

    /* Email body */
    .email-body-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border-light);
      padding: 26px 30px; box-shadow: var(--shadow-sm);
      font-size: 14px; line-height: 1.85;
      color: var(--text-2); margin-bottom: 22px;
    }
    .email-body-card p { margin-bottom: .6em; }

    /* Reply buttons */
    .reply-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .reply-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 20px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--card); cursor: pointer;
      font-family: 'Poppins', sans-serif; font-size: 12.5px; font-weight: 500;
      color: var(--text-2); transition: var(--transition);
    }
    .reply-btn:hover {
      border-color: var(--crimson-soft);
      color: var(--crimson); background: var(--crimson-faint);
    }

    /* ─── Avatar ─────────────────────────────────────────────────────────────── */
    .avatar {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; flex-shrink: 0; letter-spacing: .02em;
      color: white; user-select: none; font-family: 'Poppins', sans-serif;
    }

    /* ─── Compose Window ─────────────────────────────────────────────────────── */
    #compose-window {
      position: fixed; bottom: 0; right: 28px;
      width: 480px; z-index: 500;
      background: var(--card);
      border-radius: 14px 14px 0 0;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border); border-bottom: none;
      display: flex; flex-direction: column; overflow: hidden;
      animation: bounceUp .32s cubic-bezier(.34,1.56,.64,1) both;
    }
    #compose-window.hidden { display: none; }
    #compose-window.minimized { height: 46px; }

    .compose-header {
      display: flex; align-items: center;
      padding: 11px 16px;
      background: var(--crimson);
      flex-shrink: 0; cursor: default;
    }
    .compose-title {
      font-size: 13px; font-weight: 700; color: white; flex: 1;
    }
    .compose-ctrl {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,.15); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; margin-left: 4px;
      transition: background .15s;
    }
    .compose-ctrl:hover { background: rgba(255,255,255,.28); }

    .compose-field {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border-light);
      padding: 0 16px; gap: 9px;
    }
    .compose-field-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-3);
      width: 54px; flex-shrink: 0;
    }
    .compose-field input {
      flex: 1; border: none; background: transparent;
      font-family: 'Poppins', sans-serif; font-size: 13px;
      color: var(--text-1); outline: none; padding: 10px 0;
    }
    .compose-field.error { background: rgba(220,38,38,.04); }
    .compose-field.error .compose-field-label { color: #dc2626; }
    .compose-field-error { font-size: 10.5px; color: #dc2626; white-space: nowrap; }

    .compose-body {
      width: 100%; resize: none; border: none;
      border-bottom: 1px solid var(--border-light);
      padding: 12px 16px;
      font-family: 'Poppins', sans-serif; font-size: 13px;
      color: var(--text-1); background: transparent;
      outline: none; line-height: 1.7;
    }

    .compose-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-top: 1px solid var(--border-light);
    }

    .send-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 22px; background: var(--crimson); color: white;
      border: none; border-radius: var(--radius-pill);
      font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; box-shadow: 0 2px 10px var(--crimson-glow);
      transition: var(--transition);
    }
    .send-btn:hover { background: var(--crimson-light); transform: translateY(-1px); box-shadow: 0 5px 16px var(--crimson-glow); }
    .send-btn:disabled { opacity: .75; cursor: wait; }

    .compose-tool-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-3); transition: var(--transition);
    }
    .compose-tool-btn:hover { background: var(--surface); color: var(--text-2); }

    /* Sending state */
    .sending-dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: white; margin: 0 2px;
      animation: dotBounce 1.2s infinite ease-in-out both;
    }
    .sending-dots span:nth-child(2) { animation-delay: .16s; }
    .sending-dots span:nth-child(3) { animation-delay: .32s; }

    /* ─── Toast ──────────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
    }
    .toast-msg {
      display: flex; align-items: center; gap: 9px;
      padding: 11px 20px; border-radius: var(--radius-pill);
      background: var(--text-1); color: var(--bg);
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg); pointer-events: auto;
      animation: fadeUp .3s ease both;
    }
    .toast-msg.success { background: #15803d; color: white; }
    .toast-msg.error { background: #dc2626; color: white; }

    /* ─── Overlay (mobile) ───────────────────────────────────────────────────── */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); backdrop-filter: blur(2px);
      z-index: 150;
    }

    /* ─── Empty list state ───────────────────────────────────────────────────── */
    .list-empty {
      display: flex; flex-direction: column;
      align-items: center; padding: 52px 24px; gap: 12px;
      color: var(--text-3);
    }
    .list-empty-icon { font-size: 40px; color: var(--border); }

    /* ─── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      :root { --sidebar-w: 230px; --list-w: 280px; }
      #view-content { padding: 20px 22px; }
    }
    @media (max-width: 700px) {
      #sidebar {
        position: fixed; left: 0; top: var(--topbar-h);
        height: calc(100vh - var(--topbar-h));
        z-index: 160; box-shadow: var(--shadow-lg);

      #sidebar.collapsed { width: 0; }
      #overlay.show { display: block; }
      :root { --list-w: 100%; }

      #compose-window { width: calc(100vw - 16px); right: 8px; }
      .logo-text { display: none; }
    }

    /* ─── Spin util ──────────────────────────────────────────────────────────── */
    .spin { animation: spin .7s linear infinite; }

    /* highlight search */
    mark { background: rgba(139,0,0,0.15); color: var(--crimson); border-radius: 2px; padding: 0 1px; }
  </style>
</head>

}
function highlight(text, q) {
  if (!q) return escHtml(text);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escHtml(text).replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── GENERATE EMAILS ─────────────────────────────────────────────────────────
function generateEmails(count = 30) {
  const now = Date.now();
  const offsets = [3,12,35,78,150,240,480,720,1440,2880,4320,7200,10080,14400];
  return Array.from({length: count}, (_,i) => {
    const user   = USERS[i % USERS.length];
    const folder = FOLDERS_LIST[i % FOLDERS_LIST.length];
    const tag    = TAGS_LIST[i % TAGS_LIST.length];
    return {
      id:          i + 1,
      subject:     SUBJECTS[i % SUBJECTS.length],
      preview:     BODIES[i % BODIES.length].slice(0,110) + '…',
      body:        BODIES[i % BODIES.length],
      from:        folder === 'sent' ? {name:'Você', email:'voce@mailflow.io'} : user,
      to:          folder === 'sent' ? [user] : [{name:'Você', email:'voce@mailflow.io'}],
      date:        new Date(now - offsets[i % offsets.length] * 60000),
      read:        i % 3 !== 0,
      starred:     i % 7 === 0,
      folder,
      tag,
      attachments: i % 6 === 0 ? [{name:'documento.pdf',size:'245 KB'}, {name:'relatorio.xlsx',size:'1.2 MB'}] : [],
    };
  });
}

// ── STATE ───────────────────────────────────────────────────────────────────
const State = {
  emails:          generateEmails(30),
  activeFolder:    'inbox',
  activeFilter:    'all',
  searchQuery:     '',
  selectedId:      null,
  darkMode:        false,
  sidebarOpen:     true,

  get filtered() {
    let list = this.emails;
    // Folder filter
    if (this.activeFolder.startsWith('tag-')) {
      const tag = this.activeFolder.replace('tag-','');
      list = list.filter(e => e.tag === tag);
    } else if (this.activeFolder === 'starred') {
      list = list.filter(e => e.starred);
    } else {
      list = list.filter(e => e.folder === this.activeFolder);
    }
    // Tab filter
    if (this.activeFilter === 'unread')   list = list.filter(e => !e.read);
    if (this.activeFilter === 'starred')  list = list.filter(e => e.starred);
    if (this.activeFilter === 'attach')   list = list.filter(e => e.attachments.length > 0);
    // Search
    if (this.searchQuery.trim()) {
      const q = this.searchQuery.toLowerCase();
      list = list.filter(e =>
        e.subject.toLowerCase().includes(q) ||
        e.from.name.toLowerCase().includes(q) ||
        e.preview.toLowerCase().includes(q)
      );
    }
    return list;
  },
  get selectedEmail() {
    return this.emails.find(e => e.id === this.selectedId) || null;
  },
  get unreadCount() {
    return this.emails.filter(e => e.folder === 'inbox' && !e.read).length;
  },
  get starredCount() {
    return this.emails.filter(e => e.starred).length;
  },
  get draftsCount() {
    return this.emails.filter(e => e.folder === 'drafts').length;
  },
};

// ── AVATAR HELPER ────────────────────────────────────────────────────────────
function avatarHtml(name, size=34, fontSize=13) {
  const bg  = strColor(name);
  const ini = initials(name);
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${fontSize}px;background:${bg}">${ini}</div>`;
}

// ── TAG HELPER ───────────────────────────────────────────────────────────────
function tagHtml(tag) {
  if (!tag) return '';
  const s = TAG_STYLES[tag] || {bg:'#f3f4f6',color:'#374151'};
  return `<span class="tag-pill" style="background:${s.bg};color:${s.color}">${tag}</span>`;
}

// ── RENDER EMAIL LIST ────────────────────────────────────────────────────────
function renderList() {
  const list = State.filtered;
  const container = document.getElementById('email-list');
  const title     = document.getElementById('list-title');
  const chip      = document.getElementById('unread-chip');
  const q         = State.searchQuery;

  // Update title
  const LABELS = {
    inbox:'Caixa de Entrada', starred:'Com Estrela', sent:'Enviados',
    drafts:'Rascunhos', trash:'Lixeira',
    'tag-work':'Trabalho','tag-personal':'Pessoal','tag-finance':'Finanças'
  };
  title.textContent = q ? `Resultados para "${q}"` : (LABELS[State.activeFolder] || State.activeFolder);

  // Unread chip
  const unread = list.filter(e => !e.read).length;
  if (unread > 0) {
    chip.textContent = `${unread} não ${unread===1?'lido':'lidos'}`;
    chip.style.display = '';
  } else {
    chip.style.display = 'none';
  }

  // Update badges
  document.getElementById('badge-inbox').textContent   = State.unreadCount;
  document.getElementById('badge-starred').textContent = State.starredCount;
  document.getElementById('badge-drafts').textContent  = State.draftsCount;
  document.querySelectorAll('[id^="badge-"]').forEach(b => {
    b.style.display = b.textContent === '0' ? 'none' : '';
  });

  // Empty
  if (list.length === 0) {
    container.innerHTML = `
      <div class="list-empty">
        <i class="bi bi-inbox list-empty-icon"></i>
        <div style="text-align:center">
          <p style="font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:4px">
            ${q ? 'Nenhum resultado encontrado' : 'Pasta vazia'}
          </p>
          <p style="font-size:12px;color:var(--text-3)">
            ${q ? 'Tente outros termos de pesquisa' : 'Nenhum email aqui'}
          </p>
        </div>
      </div>`;
    return;
  }

  // Build items
  container.innerHTML = list.map((email, idx) => {
    const selected = email.id === State.selectedId;
    const delay    = idx * 25;
    const att      = email.attachments.length > 0 ? '<i class="bi bi-paperclip" style="font-size:11px;color:var(--text-3)"></i>' : '';
    return `
    <div class="email-item${email.read?'':' unread'}${selected?' selected':''}"
         data-id="${email.id}"
         style="animation:fadeUp .3s cubic-bezier(.4,0,.2,1) ${delay}ms both">
      <div class="email-item-avatar">
        ${avatarHtml(email.from.name, 35, 13)}
      </div>
      <div class="email-item-body">
        <div class="email-item-row1">
          <span class="email-item-from">${highlight(email.from.name, q)}</span>
          <div class="email-item-actions">
            <button class="action-mini" data-action="read" data-id="${email.id}" title="${email.read?'Marcar não lido':'Marcar lido'}">
              <i class="bi bi-${email.read?'envelope':'envelope-open'}"></i>
            </button>
            <button class="action-mini danger" data-action="delete" data-id="${email.id}" title="Excluir">
              <i class="bi bi-trash"></i>
            </button>
          </div>
          <span class="email-item-date">${formatDate(email.date)}</span>
        </div>
        <div class="email-item-subject">${highlight(email.subject, q)}</div>
        <div class="email-item-row3">
          <span class="email-item-preview">${highlight(email.preview, q)}</span>
          ${tagHtml(email.tag)}
          ${att}
          <button class="star-btn${email.starred?' starred':''}" data-action="star" data-id="${email.id}" title="Favoritar">
            <i class="bi bi-star${email.starred?'-fill':''}"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Attach click events
  container.querySelectorAll('.email-item').forEach(el => {
    el.addEventListener('click', e => {
      // Ignore action button clicks
      if (e.target.closest('[data-action]')) return;
      const id = +el.dataset.id;
      selectEmail(id);
    });
  });

  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = +btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'star')   { toggleStar(id); }
      if (action === 'read')   { toggleRead(id); }
      if (action === 'delete') { deleteEmail(id); }
    });
  });
}

// ── SKELETON LOADING ─────────────────────────────────────────────────────────
function showSkeleton() {
  const container = document.getElementById('email-list');
  container.innerHTML = Array.from({length:10}, (_,i) => `
    <div style="display:flex;gap:10px;padding:11px 10px;margin-bottom:3px;animation:fadeUp .3s ease ${i*50}ms both">
      <div class="skeleton" style="width:35px;height:35px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:7px">
        <div style="display:flex;justify-content:space-between">
          <div class="skeleton" style="width:${120+i%3*30}px;height:12px"></div>
          <div class="skeleton" style="width:34px;height:10px"></div>
        </div>
        <div class="skeleton" style="width:${70+i%4*5}%;height:11px"></div>
        <div class="skeleton" style="width:${50+i%3*8}%;height:10px"></div>
      </div>
    </div>`).join('');
}

// ── SELECT EMAIL ─────────────────────────────────────────────────────────────
function selectEmail(id) {
  // Mark as read
  const email = State.emails.find(e => e.id === id);
  if (email) email.read = true;
  State.selectedId = id;
  renderList();
  renderEmailView();

  // Mobile: show view panel
  document.getElementById('email-view-panel').classList.add('show');
}

// ── RENDER EMAIL VIEW ────────────────────────────────────────────────────────
function renderEmailView() {
  const email = State.selectedEmail;
  const empty = document.getElementById('empty-state');
  const view  = document.getElementById('email-view');

  if (!email) {
    empty.style.display = 'flex';
    view.style.display  = 'none';
    return;
  }

  empty.style.display = 'none';
  view.style.display  = 'flex';
  view.classList.add('anim-slideRight');
  setTimeout(() => view.classList.remove('anim-slideRight'), 350);

  // Subject
  document.getElementById('view-subject').textContent = email.subject;

  // Tag next to subject
  const subjEl = document.getElementById('view-subject');
  subjEl.innerHTML = escHtml(email.subject) +
    (email.tag ? ` <span style="vertical-align:middle;margin-left:10px">${tagHtml(email.tag)}</span>` : '');

  // Sender card
  const avEl = document.getElementById('sender-avatar');
  avEl.style.background = strColor(email.from.name);
  avEl.textContent = initials(email.from.name);
  document.getElementById('sender-name').textContent  = email.from.name;
  document.getElementById('sender-email').textContent = `<${email.from.email}>`;
  document.getElementById('sender-to').textContent    = `Para: ${email.to.map(t=>t.name).join(', ')}`;
  document.getElementById('view-full-date').textContent = formatFullDate(email.date);
  document.getElementById('view-date-label').textContent = formatFullDate(email.date);

  // Attachments
  const attRow = document.getElementById('attachments-row');
  if (email.attachments.length > 0) {
    attRow.style.display = 'flex';
    attRow.innerHTML = email.attachments.map(a => `
      <div class="attachment-chip">
        <i class="bi bi-file-earmark-pdf"></i>
        <span>${a.name}</span>
        <span style="color:var(--text-3);font-size:11px">${a.size}</span>
        <i class="bi bi-download" style="font-size:11px;margin-left:4px"></i>
      </div>`).join('');
  } else {
    attRow.style.display = 'none';
  }

  // Body
  document.getElementById('email-body').innerHTML = email.body
    .split('\n').map(l => `<p>${escHtml(l)}</p>`).join('');

  // Toolbar buttons state
  const starBtn = document.getElementById('view-star');
  starBtn.querySelector('i').className = `bi bi-star${email.starred?'-fill':''}`;
  starBtn.style.color = email.starred ? '#f59e0b' : '';

  const readBtn = document.getElementById('view-read-toggle');
  readBtn.querySelector('i').className = `bi bi-${email.read ? 'envelope' : 'envelope-open'}`;
  readBtn.title = email.read ? 'Marcar não lido' : 'Marcar como lido';
}

// ── MUTATIONS ────────────────────────────────────────────────────────────────
function toggleStar(id) {
  const e = State.emails.find(e => e.id === id);
  if (e) e.starred = !e.starred;
  renderList();
  if (State.selectedId === id) renderEmailView();
}

function toggleRead(id) {
  const e = State.emails.find(e => e.id === id);
  if (e) e.read = !e.read;
  renderList();
  if (State.selectedId === id) renderEmailView();
}

function deleteEmail(id) {
  State.emails = State.emails.filter(e => e.id !== id);
  if (State.selectedId === id) {
    State.selectedId = null;
    renderEmailView();
  }
  renderList();
  showToast('Email excluído', 'default', 'bi-trash');
}

function setFolder(folder) {
  State.activeFolder = folder;
  State.selectedId   = null;
  State.searchQuery  = '';
  State.activeFilter = 'all';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  // Update active nav item
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.folder === folder);
  });
  // Update active filter tab
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.filter === 'all');
  });
  // Skeleton + render
  showSkeleton();
  setTimeout(() => { renderList(); renderEmailView(); }, 500);
  // Mobile: close sidebar
  if (window.innerWidth <= 700) closeSidebar();
}

// ── REFRESH ──────────────────────────────────────────────────────────────────
function refresh() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spin');
  showSkeleton();
  setTimeout(() => {
    icon.classList.remove('spin');
    renderList();
    showToast('Emails atualizados', 'default', 'bi-check-circle');
  }, 1000);
}

// ── SIDEBAR TOGGLE ───────────────────────────────────────────────────────────
function toggleSidebar() {
  State.sidebarOpen = !State.sidebarOpen;
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('collapsed', !State.sidebarOpen);
  if (window.innerWidth <= 700) {
    ov.classList.toggle('show', State.sidebarOpen);
  }
}
function closeSidebar() {
  State.sidebarOpen = false;
  document.getElementById('sidebar').classList.add('collapsed');
  document.getElementById('overlay').classList.remove('show');
}

// ── DARK MODE ────────────────────────────────────────────────────────────────
function toggleDark() {
  State.darkMode = !State.darkMode;
  document.documentElement.setAttribute('data-theme', State.darkMode ? 'dark' : 'light');
  const btn = document.getElementById('dark-toggle');
  btn.querySelector('i').className = `bi bi-${State.darkMode ? 'sun' : 'moon'}`;
  btn.classList.toggle('active', State.darkMode);
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
let searchTimer;
function onSearch(val) {
  clearTimeout(searchTimer);
  document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
  searchTimer = setTimeout(() => {
    State.searchQuery = val;
    showSkeleton();
    setTimeout(renderList, 400);
  }, 350);
}

// ── COMPOSE ──────────────────────────────────────────────────────────────────
let composeMinimized = false;

function openCompose(opts = {}) {
  const win = document.getElementById('compose-window');
  win.classList.remove('hidden','minimized');
  composeMinimized = false;
  document.getElementById('compose-to').value      = opts.to      || '';
  document.getElementById('compose-subject').value = opts.subject || '';
  document.getElementById('compose-body-text').value = opts.body  || '';
  clearComposeErrors();
  // Focus
  setTimeout(() => {
    (opts.to ? document.getElementById('compose-subject') : document.getElementById('compose-to')).focus();
  }, 100);
}

function closeCompose() {
  document.getElementById('compose-window').classList.add('hidden');
}

function toggleMinimize() {
  composeMinimized = !composeMinimized;
  document.getElementById('compose-window').classList.toggle('minimized', composeMinimized);
  const icon = document.getElementById('compose-minimize').querySelector('i');
  icon.className = `bi bi-${composeMinimized ? 'arrows-angle-expand' : 'dash-lg'}`;
}

function clearComposeErrors() {
  ['to','subject'].forEach(f => {
    document.getElementById(`field-${f}`).classList.remove('error');
    document.getElementById(`err-${f}`).style.display = 'none';
  });
}

async function sendEmail() {
  const to      = document.getElementById('compose-to').value.trim();
  const subject = document.getElementById('compose-subject').value.trim();
  const body    = document.getElementById('compose-body-text').value.trim();
  clearComposeErrors();
  let valid = true;
  if (!to) {
    document.getElementById('field-to').classList.add('error');
    document.getElementById('err-to').style.display = '';
    valid = false;
  }
  if (!subject) {
    document.getElementById('field-subject').classList.add('error');
    document.getElementById('err-subject').style.display = '';
    valid = false;
  }
  if (!valid) return;

  // Sending state
  const sendBtn = document.getElementById('send-btn');
  const sendLabel = document.getElementById('send-label');
  sendBtn.disabled = true;
  sendLabel.innerHTML = `<span class="sending-dots"><span></span><span></span><span></span></span>`;

  await new Promise(r => setTimeout(r, 900));

  // Add to sent
  const newEmail = {
    id:          Date.now(),
    subject,
    preview:     body.slice(0,110) + '…',
    body,
    from:        {name:'Você', email:'voce@mailflow.io'},
    to:          [{name: to, email: to}],
    date:        new Date(),
    read:        true,
    starred:     false,
    folder:      'sent',
    tag:         null,
    attachments: [],
  };
  State.emails.unshift(newEmail);

  sendBtn.disabled = false;
  sendLabel.textContent = 'Enviar';
  closeCompose();
  showToast('Email enviado com sucesso!', 'success', 'bi-check-circle-fill');

  if (State.activeFolder === 'sent') renderList();
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'default', icon = 'bi-info-circle') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast-msg${type !== 'default' ? ' '+type : ''}`;
  toast.innerHTML = `<i class="bi ${icon}"></i> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(10px)'; toast.style.transition = 'all .3s'; setTimeout(() => toast.remove(), 320); }, 3000);
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'c' || e.key === 'C') openCompose();
  if (e.key === 'Escape') {
    if (State.selectedId) { State.selectedId = null; renderEmailView(); }
    closeCompose();
  }
  if (e.key === '?' ) showToast('Atalhos: C = Compor, Esc = Fechar', 'default', 'bi-keyboard');
  if (e.key === 'd' && State.selectedId) deleteEmail(State.selectedId);
  if (e.key === 'u' && State.selectedId) toggleRead(State.selectedId);
  if (e.key === 's' && State.selectedId) toggleStar(State.selectedId);
});

// ── EVENT BINDINGS ────────────────────────────────────────────────────────────
document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
document.getElementById('overlay').addEventListener('click', closeSidebar);
document.getElementById('dark-toggle').addEventListener('click', toggleDark);
document.getElementById('refresh-btn').addEventListener('click', refresh);
document.getElementById('compose-btn').addEventListener('click', () => openCompose());
document.getElementById('compose-close').addEventListener('click', closeCompose);
document.getElementById('compose-minimize').addEventListener('click', toggleMinimize);
document.getElementById('compose-header').addEventListener('dblclick', toggleMinimize);
document.getElementById('send-btn').addEventListener('click', sendEmail);

// Search
document.getElementById('search-input').addEventListener('input', e => onSearch(e.target.value));
document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  onSearch('');
  document.getElementById('search-input').focus();
});

// Nav folders
document.querySelectorAll('.nav-item[data-folder]').forEach(btn => {
  btn.addEventListener('click', () => setFolder(btn.dataset.folder));
});

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    State.activeFilter = tab.dataset.filter;
    showSkeleton();
    setTimeout(renderList, 380);
  });
});

// View toolbar
document.getElementById('view-back').addEventListener('click', () => {
  State.selectedId = null;
  renderEmailView();
  renderList();
  document.getElementById('email-view-panel').classList.remove('show');
});

document.getElementById('view-delete').addEventListener('click', () => {
  if (State.selectedId) deleteEmail(State.selectedId);
});
document.getElementById('view-read-toggle').addEventListener('click', () => {
  if (State.selectedId) toggleRead(State.selectedId);
});
document.getElementById('view-star').addEventListener('click', () => {
  if (State.selectedId) toggleStar(State.selectedId);
});
document.getElementById('reply-btn').addEventListener('click', () => {
  const e = State.selectedEmail;
  if (e) openCompose({to: e.from.email, subject: `Re: ${e.subject}`});
});
document.getElementById('reply-all-btn').addEventListener('click', () => {
  const e = State.selectedEmail;
  if (e) openCompose({to: e.from.email, subject: `Re: ${e.subject}`});
});
document.getElementById('forward-btn').addEventListener('click', () => {
  const e = State.selectedEmail;
  if (e) openCompose({subject: `Fwd: ${e.subject}`, body: `\n\n--- Mensagem original ---\nDe: ${e.from.name} <${e.from.email}>\n\n${e.body}`});
});

// ── INITIAL RENDER ────────────────────────────────────────────────────────────
showSkeleton();
setTimeout(() => {
  renderList();
  renderEmailView();
  showToast('Bem-vindo ao MailFlow! Pressione ? para atalhos.', 'default', 'bi-envelope-heart-fill');
}, 700);

// ── RESPONSIVE: close sidebar on small screen initially ───────────────────────
if (window.innerWidth <= 700) {
  State.sidebarOpen = false;
  document.getElementById('sidebar').classList.add('collapsed');
}
</script>
